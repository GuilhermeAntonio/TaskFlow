openapi: 3.0.3
info:
  title: TaskFlow API
  description: >-
    API REST para gerenciamento de projetos e tarefas. Contrato formal para Specification-Driven Development (SDD).
  version: 0.1.0

tags:
  - name: Projetos
    description: Operações relacionadas a projetos
  - name: Tarefas
    description: Operações relacionadas a tarefas

paths:
  /projetos:
    post:
      tags: [Projetos]
      summary: Criar um novo projeto
      description: >-
        Cria um projeto. O `id` é gerado automaticamente, o campo `createdAt`
        é preenchido automaticamente em UTC e o `status` inicial é definido como
        `active`. Esses campos (`id`, `status`, `createdAt`) não podem ser
        enviados pelo cliente. O `name` é normalizado removendo espaços no início
        e no final.
      operationId: criarProjeto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
            examples:
              exemplo-criar-projeto:
                value:
                  name: Projeto Exemplo
                  description: Descrição opcional do projeto
      responses:
        '201':
          description: Projeto criado
          headers:
            Location:
              description: URL do recurso criado
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
              examples:
                projeto-criado:
                  value:
                    id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    name: Projeto Exemplo
                    description: Descrição opcional do projeto
                    status: active
                    createdAt: "2026-07-17T12:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/ProjectNameConflict'

    get:
      tags: [Projetos]
      summary: Listar projetos (filtro opcional por status)
      description: >-
        Retorna os projetos cadastrados, permitindo filtro opcional por status.
        A listagem é retornada sem ordenação definida.
      operationId: listarProjetos
      parameters:
        - name: status
          in: query
          description: Filtrar por status (`active` ou `archived`)
          schema:
            $ref: '#/components/schemas/ProjectStatus'
      responses:
        '200':
          description: Lista de projetos (pode ser vazia)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectResponse'
              examples:
                lista-vazia:
                  value: []
        '400':
          $ref: '#/components/responses/BadRequest'

  /projetos/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'

    get:
      tags: [Projetos]
      summary: Obter um projeto por id
      operationId: obterProjeto
      responses:
        '200':
          description: Projeto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
              examples:
                projeto-exemplo:
                  value:
                    id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    name: Projeto Exemplo
                    description: null
                    status: active
                    createdAt: "2026-07-17T12:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/ProjectNotFound'

    patch:
      tags: [Projetos]
      summary: Atualizar parcialmente um projeto
      description: >-
        Atualiza somente os campos enviados; os campos omitidos permanecem
        inalterados. Enviar `description: null` remove a descrição atual.
        A alteração de `active` para `archived` é permitida somente quando o
        projeto não possui tarefas com status `in_progress`. A alteração de
        `archived` para `active` é permitida. Reenviar o status atual é uma
        operação idempotente. Projetos arquivados ainda permitem alterações
        de nome e descrição. O nome deve ser único globalmente, ignorando
        diferenças entre letras maiúsculas e minúsculas e espaços no início
        e no final.
      operationId: atualizarProjeto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Projeto atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/ProjectNotFound'
        '409':
          $ref: '#/components/responses/ProjectNameConflictOnUpdate'
        '422':
          $ref: '#/components/responses/ProjectHasInProgressTasks'

  /projetos/{id}/tarefas:
    parameters:
      - $ref: '#/components/parameters/IdParam'

    post:
      tags: [Tarefas]
      summary: Criar tarefa para um projeto
      description: >-
        Cria uma tarefa para o projeto informado. O `id` é gerado automaticamente,
        o campo `createdAt` é preenchido automaticamente em UTC e o `status` inicial
        é definido como `pending`. O campo `completedAt` inicia como `null` e o
        `projectId` é obtido a partir do parâmetro de rota. Os campos `id`, `status`,
        `createdAt`, `completedAt` e `projectId` não podem ser enviados pelo
        cliente. O `title` é normalizado removendo espaços no início e no final.
        Não é permitido criar tarefas em um projeto arquivado.
      operationId: criarTarefa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            examples:
              exemplo-criar-tarefa:
                value:
                  title: Implementar feature X
                  description: Descrição opcional
                  priority: medium
      responses:
        '201':
          description: Tarefa criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
              examples:
                tarefa-criada:
                  value:
                    id: "d290f1ee-6c54-4b01-90e6-d701748f0851"
                    title: Implementar feature X
                    description: null
                    status: pending
                    priority: medium
                    createdAt: "2026-07-17T12:00:00Z"
                    completedAt: null
                    projectId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/ProjectNotFoundForTaskCollection'
        '409':
          $ref: '#/components/responses/TaskTitleConflict'
        '422':
          $ref: '#/components/responses/ArchivedProjectDoesNotAcceptTasks'

    get:
      tags: [Tarefas]
      summary: Listar tarefas de um projeto com filtros opcionais
      description: >-
        Retorna as tarefas pertencentes ao projeto, permitindo filtros opcionais
        por status e prioridade. A listagem é retornada sem ordenação definida.
      operationId: listarTarefasDoProjeto
      parameters:
        - name: status
          in: query
          description: Filtrar por status (`pending`, `in_progress`, `done`)
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: priority
          in: query
          description: Filtrar por prioridade (`low`, `medium`, `high`)
          schema:
            $ref: '#/components/schemas/TaskPriority'
      responses:
        '200':
          description: Lista de tarefas do projeto (pode ser vazia)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResponse'
              examples:
                lista-vazia:
                  value: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/ProjectNotFoundForTaskCollection'

  /tarefas/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'

    patch:
      tags: [Tarefas]
      summary: Atualizar parcialmente uma tarefa
      description: >-
        Atualiza somente os campos enviados; os campos omitidos permanecem
        inalterados. Enviar `description: null` remove a descrição atual.
        O fluxo obrigatório de status é `pending` para `in_progress` e depois
        para `done`, sem saltos ou retrocessos. Reenviar `pending` ou
        `in_progress` para uma tarefa que já possui o mesmo status é uma
        operação idempotente. Na alteração de `in_progress` para `done`,
        `completedAt` é preenchido automaticamente com o horário atual em UTC
        e não pode ser informado pelo cliente. Tarefas com status `done` são
        imutáveis, exceto pelo reenvio isolado de `{ "status": "done" }`, que
        é idempotente e preserva o valor original de `completedAt`. O envio
        desse status junto com qualquer outro campo para uma tarefa concluída
        retorna `422`. O título deve ser único dentro do respectivo projeto,
        ignorando diferenças entre letras maiúsculas e minúsculas e espaços
        no início e no final.
      operationId: atualizarTarefa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Tarefa atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/TaskNotFound'
        '409':
          $ref: '#/components/responses/TaskTitleConflictOnUpdate'
        '422':
          $ref: '#/components/responses/TaskUpdateBusinessRuleViolation'

    delete:
      tags: [Tarefas]
      summary: Excluir uma tarefa
      operationId: excluirTarefa
      responses:
        '204':
          description: Tarefa excluída com sucesso (sem conteúdo)
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/TaskNotFound'
        '422':
          $ref: '#/components/responses/TaskCannotBeDeleted'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Identificador do recurso (UUID)
      schema:
        type: string
        format: uuid

  schemas:
    ProjectStatus:
      type: string
      enum: [active, archived]

    TaskStatus:
      type: string
      enum: [pending, in_progress, done]

    TaskPriority:
      type: string
      enum: [low, medium, high]

    ErrorCode:
      type: string
      enum:
        - validation_error
        - project_not_found
        - task_not_found
        - project_has_in_progress_tasks
        - archived_project_does_not_accept_tasks
        - invalid_task_status_transition
        - task_cannot_be_deleted
        - completed_task_cannot_be_modified
        - project_name_conflict
        - task_title_conflict

    ProblemDetails:
      type: object
      description: Estrutura base para erros conforme RFC 7807 com campo `code`.
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        code:
          $ref: '#/components/schemas/ErrorCode'
      required: [type, title, status, detail, instance, code]
      additionalProperties: true

    ValidationProblemDetails:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
          required: [errors]
          additionalProperties: true

    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '.*\S.*'
          description: >-
            Nome do projeto. Deve conter ao menos um caractere diferente de
            espaço e será normalizado removendo espaços no início e no final.
        description:
          type: string
          nullable: true
      required: [name]
      additionalProperties: false

    UpdateProjectRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '.*\S.*'
          description: >-
            Novo nome do projeto. Deve conter ao menos um caractere diferente
            de espaço e será normalizado removendo espaços no início e no final.
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'

    ProjectResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '.*\S.*'
          description: >-
            Nome do projeto normalizado removendo espaços no início e no final.
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Gerado pela aplicação em UTC.
      required: [id, name, description, status, createdAt]
      additionalProperties: false

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          pattern: '.*\S.*'
          description: >-
            Título da tarefa. Deve conter ao menos um caractere diferente de
            espaço e será normalizado removendo espaços no início e no final.
        description:
          type: string
          nullable: true
        priority:
          $ref: '#/components/schemas/TaskPriority'
      required: [title, priority]
      additionalProperties: false

    UpdateTaskRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          pattern: '.*\S.*'
          description: >-
            Novo título da tarefa. Deve conter ao menos um caractere diferente
            de espaço e será normalizado removendo espaços no início e no final.
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'

    TaskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          minLength: 1
          maxLength: 200
          pattern: '.*\S.*'
          description: >-
            Título da tarefa normalizado removendo espaços no início e no final.
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Gerado pela aplicação em UTC.
        completedAt:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: >-
            Preenchido automaticamente em UTC quando a tarefa passa de
            in_progress para done. Permanece null enquanto a tarefa não estiver
            concluída.
        projectId:
          type: string
          format: uuid
          readOnly: true
      required: [id, title, description, status, priority, createdAt, completedAt, projectId]
      additionalProperties: false

  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationProblemDetails'
          examples:
            corpo-patch-vazio:
              summary: Objeto vazio enviado em uma atualização parcial
              value:
                type: 'about:blank'
                title: 'Dados de entrada inválidos'
                status: 400
                detail: 'O objeto enviado no PATCH deve conter ao menos um campo.'
                instance: '/projetos/3fa85f64-5717-4562-b3fc-2c963f66afa6'
                code: validation_error
                errors:
                  requestBody:
                    - 'O objeto enviado deve conter ao menos um campo permitido.'
            propriedade-nao-permitida:
              value:
                type: 'about:blank'
                title: 'Propriedade não permitida'
                status: 400
                detail: 'A requisição contém uma propriedade que não é permitida pelo schema.'
                instance: '/projetos'
                code: validation_error
                errors:
                  unexpectedField: ['A propriedade extra fornecida não é permitida.']
            campos-controlados-projeto:
              summary: Campos controlados pela aplicação enviados na criação do projeto
              value:
                type: 'about:blank'
                title: 'Campos controlados pela aplicação'
                status: 400
                detail: >-
                  Os campos id, status e createdAt são definidos pela aplicação
                  e não podem ser enviados pelo cliente na criação do projeto.
                instance: '/projetos'
                code: validation_error
                errors:
                  id:
                    - 'O campo id não pode ser enviado.'
                  status:
                    - 'O campo status não pode ser enviado na criação do projeto.'
                  createdAt:
                    - 'O campo createdAt não pode ser enviado.'
            campos-controlados-tarefa:
              summary: Campos controlados pela aplicação enviados na criação da tarefa
              value:
                type: 'about:blank'
                title: 'Campos controlados pela aplicação'
                status: 400
                detail: >-
                  Os campos id, status, createdAt, completedAt e projectId são
                  definidos pela aplicação e não podem ser enviados pelo cliente
                  na criação da tarefa.
                instance: '/projetos/3fa85f64-5717-4562-b3fc-2c963f66afa6/tarefas'
                code: validation_error
                errors:
                  id:
                    - 'O campo id não pode ser enviado.'
                  status:
                    - 'O campo status não pode ser enviado na criação da tarefa.'
                  createdAt:
                    - 'O campo createdAt não pode ser enviado.'
                  completedAt:
                    - 'O campo completedAt não pode ser enviado.'
                  projectId:
                    - 'O campo projectId é obtido pelo parâmetro da rota.'
            uuid-invalido:
              value:
                type: 'about:blank'
                title: 'UUID inválido'
                status: 400
                detail: 'O identificador fornecido na rota não é um UUID válido.'
                instance: '/projetos/uuid-invalido'
                code: validation_error
                errors:
                  id: ['O valor deve ser um UUID válido.']
            filtro-invalido:
              value:
                type: 'about:blank'
                title: 'Filtro inválido'
                status: 400
                detail: 'O valor do filtro fornecido não é válido.'
                instance: '/projetos?status=invalid'
                code: validation_error
                errors:
                  status: ['O valor deve ser um dos valores permitidos: active, archived.']
            enum-invalido:
              summary: Status inválido enviado na atualização do projeto
              value:
                type: 'about:blank'
                title: 'Enum inválido'
                status: 400
                detail: 'O valor fornecido para o campo status não é válido.'
                instance: '/projetos/3fa85f64-5717-4562-b3fc-2c963f66afa6'
                code: validation_error
                errors:
                  status:
                    - 'O valor deve ser active ou archived.'
            nome-acima-do-limite:
              value:
                type: 'about:blank'
                title: 'Valor acima do limite'
                status: 400
                detail: 'O valor do campo excede o limite de caracteres permitido.'
                instance: '/projetos'
                code: validation_error
                errors:
                  name: ['O campo name não pode exceder 100 caracteres.']
            titulo-acima-do-limite:
              value:
                type: 'about:blank'
                title: 'Valor acima do limite'
                status: 400
                detail: 'O valor do campo excede o limite de caracteres permitido.'
                instance: '/projetos/3fa85f64-5717-4562-b3fc-2c963f66afa6/tarefas'
                code: validation_error
                errors:
                  title: ['O campo title não pode exceder 200 caracteres.']
            nome-so-espacos:
              value:
                type: 'about:blank'
                title: 'Valor inválido'
                status: 400
                detail: 'O campo não pode ser vazio ou conter apenas espaços.'
                instance: '/projetos'
                code: validation_error
                errors:
                  name: ['O campo name não pode ser vazio ou conter apenas espaços.']
            titulo-so-espacos:
              value:
                type: 'about:blank'
                title: 'Valor inválido'
                status: 400
                detail: 'O campo não pode ser vazio ou conter apenas espaços.'
                instance: '/projetos/3fa85f64-5717-4562-b3fc-2c963f66afa6/tarefas'
                code: validation_error
                errors:
                  title: ['O campo title não pode ser vazio ou conter apenas espaços.']

    ProjectNameConflictOnUpdate:
      description: Nome de projeto já existe
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            exemplo:
              value:
                type: 'about:blank'
                title: 'Conflito de nome de projeto'
                status: 409
                detail: 'Já existe um projeto com este nome.'
                instance: '/projetos/3fa85f64-5717-4562-b3fc-2c963f66afa6'
                code: project_name_conflict

    ProjectNotFound:
      description: Projeto não encontrado
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            exemplo:
              value:
                type: 'about:blank'
                title: 'Projeto não encontrado'
                status: 404
                detail: 'Projeto com o id informado não foi encontrado.'
                instance: '/projetos/3fa85f64-5717-4562-b3fc-2c963f66afa6'
                code: project_not_found

    ProjectNotFoundForTaskCollection:
      description: Projeto não encontrado
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            exemplo:
              value:
                type: 'about:blank'
                title: 'Projeto não encontrado'
                status: 404
                detail: 'Projeto com o id informado não foi encontrado.'
                instance: '/projetos/3fa85f64-5717-4562-b3fc-2c963f66afa6/tarefas'
                code: project_not_found

    TaskNotFound:
      description: Tarefa não encontrada
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            exemplo:
              value:
                type: 'about:blank'
                title: 'Tarefa não encontrada'
                status: 404
                detail: 'Tarefa com o id informado não foi encontrada.'
                instance: '/tarefas/d290f1ee-6c54-4b01-90e6-d701748f0851'
                code: task_not_found

    ProjectNameConflict:
      description: Nome de projeto já existe
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            exemplo:
              value:
                type: 'about:blank'
                title: 'Conflito de nome de projeto'
                status: 409
                detail: 'Já existe um projeto com este nome.'
                instance: '/projetos'
                code: project_name_conflict

    TaskTitleConflict:
      description: Título de tarefa duplicado no projeto
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            exemplo:
              value:
                type: 'about:blank'
                title: 'Conflito de título de tarefa'
                status: 409
                detail: 'Já existe uma tarefa com este título neste projeto.'
                instance: '/projetos/3fa85f64-5717-4562-b3fc-2c963f66afa6/tarefas'
                code: task_title_conflict

    TaskTitleConflictOnUpdate:
      description: Título de tarefa duplicado no projeto
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            exemplo:
              value:
                type: 'about:blank'
                title: 'Conflito de título de tarefa'
                status: 409
                detail: 'Já existe uma tarefa com este título neste projeto.'
                instance: '/tarefas/d290f1ee-6c54-4b01-90e6-d701748f0851'
                code: task_title_conflict

    ProjectHasInProgressTasks:
      description: Projeto possui tarefas em progresso
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          examples:
            exemplo:
              value:
                type: 'about:blank'
                title: 'Projeto possui tarefas em progresso'
                status: 422
                detail: 'Não é possível arquivar o projeto enquanto existirem tarefas em progresso.'
